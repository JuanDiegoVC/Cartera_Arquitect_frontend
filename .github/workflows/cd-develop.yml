name: Frontend CD - Development

on:
  push:
    branches: [ develop, devOps ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint
      continue-on-error: true

    - name: Build application
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
        CI: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=develop-latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Development Environment
      run: |
        echo "Deploying frontend to development environment..."
        # Aquí iría la lógica de despliegue específica de tu infraestructura
        # Ejemplos:
        # - SSH a servidor de desarrollo
        # - Llamar a API de despliegue
        # - Deploy a Vercel, Netlify, AWS S3, etc.
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_DEV }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_DEV }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER_DEV }}

    - name: Send deployment notification
      if: always()
      run: |
        echo "Frontend deployment to development completed with status: ${{ job.status }}"
