name: Frontend CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint
      continue-on-error: true

    - name: Check for console errors
      run: |
        npm run lint -- --format json > lint-report.json || true
        if grep -q "error" lint-report.json; then
          echo "ESLint errors found:"
          cat lint-report.json
          exit 0
        fi

    - name: Build application
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL_DEV || 'http://localhost:8000/api' }}

    - name: Check build output
      run: |
        if [ ! -d "dist" ]; then
          echo "Build output not found!"
          exit 1
        fi
        echo "Build successful. Output size:"
        du -sh dist/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.node-version }}
        path: dist/
        retention-days: 5

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for vulnerabilities
      run: |
        npm audit json > audit-report.json || true
        if grep -q '"severity": "high"' audit-report.json; then
          echo "High severity vulnerabilities found!"
          cat audit-report.json
        fi

  accessibility-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check React best practices
      run: |
        npm run lint
      continue-on-error: true

    - name: Build for accessibility check
      run: npm run build
      env:
        CI: true
