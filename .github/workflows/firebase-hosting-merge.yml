# =============================================================================
# SOTRAPEÑOL - Deploy Frontend to Firebase Hosting (Production)
# =============================================================================
# Este workflow se ejecuta cuando hay un merge/push a la rama main
# Despliega automáticamente a Firebase Hosting en el canal LIVE (producción)
# =============================================================================

name: 🚀 Deploy to Firebase Hosting (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

env:
  NODE_VERSION: '20.x'

jobs:
  build_and_deploy:
    name: 📦 Build & Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run linter
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          CI: true

      - name: ✅ Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist folder not found"
            exit 1
          fi
          echo "✅ Build successful"
          echo "📊 Build size:"
          du -sh dist/

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOTRAPENOL_CARTERA }}
          channelId: live
          projectId: sotrapenol-cartera

      - name: 📢 Deployment Summary
        if: success()
        run: |
          echo "=========================================="
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "=========================================="
          echo "🌐 Production URL: https://sotrapenol-cartera.web.app"
          echo "📅 Deployed at: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "=========================================="
